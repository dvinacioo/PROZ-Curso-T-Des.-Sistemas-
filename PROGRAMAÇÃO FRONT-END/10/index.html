<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <title>Tabela com Bootstrap</title>
</head>
<body>
    <div class="text-center">
        <h1>Tabela de Produtos</h1>
        <div class="table-responsive">
            <table class="table table-bordered table-hover table-striped">
                <caption>Lista de Produtos</caption>
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Produtos</th>
                        <th scope="col">Preço</th>
                        <th scope="col">Qntd. em Estoque</th>
                    </tr>
                </thead>
                <tbody>
                    <tr scope="row">
                        <td>Notebook</td>
                        <td>R$ 3.799,00</td>
                        <td class="text-danger fw-bold">6</td> <!--fw-bold deixa o texto em negrito-->
                    </tr scope="row">
                    <tr>
                        <td>Mouse</td>
                        <td>R$ 37,00</td>
                        <td>120</td>
                    </tr>
                    <tr scope="row">
                        <td>Teclado</td>
                        <td>R$ 79,90</td>
                        <td>100</td>
                    </tr>
                    <tr scope="row">
                        <td>Monitor</td>
                        <td>R$ 1.199,00</td>
                        <td>120</td>
                    </tr>
                    <tr scope="row">
                        <td>Headset</td>
                        <td>R$ 449,90</td>
                        <td class="text-danger fw-bold">20</td>
                    </tr>
                </tbody>
        
            </table>
        </div>
    </div>
</body>
</html>
